<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Tugas Universal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #25D366; --dark: #075E54; --bg: #ece5dd; --card: #ffffff; --text: #333; --border: #e0e0e0;
        }
        [data-theme="dark"] {
            --primary: #25D366; --dark: #128C7E; --bg: #111b21; --card: #202c33; --text: #e9edef; --border: #374045;
        }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 20px; transition: 0.3s; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .admin-controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 50%; cursor: pointer; font-size: 1.2em; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .container { width: 100%; max-width: 450px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        
        h2 { color: var(--primary); text-align: center; font-weight: 600; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.85em; }
        
        input, textarea { 
            width: 100%; padding: 14px; margin-top: 8px; border: 1px solid var(--border); 
            border-radius: 12px; box-sizing: border-box; font-family: 'Poppins'; background: var(--bg); color: var(--text);
        }

        .main-btn { 
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none; 
            border-radius: 12px; margin-top: 25px; font-size: 1em; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Loading Bar */
        .progress-container { display: none; width: 100%; background: var(--border); height: 6px; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.4s; }

        /* Admin Styles */
        .field-manager { border: 1px solid var(--border); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .empty-state { text-align: center; color: #888; padding: 20px; }
        .section { display: none; }
        .active { display: block; }
    </style>
</head>
<body data-theme="light">

<div class="admin-controls">
    <button class="icon-btn" onclick="toggleTheme()">🌓</button>
    <button class="icon-btn" onclick="toggleAdmin()">⚙️</button>
</div>

<div class="container">
    <!-- VIEW ANGGOTA -->
    <div id="anggota-view" class="section active">
        <h2>Kirim Tugas</h2>
        <div id="dynamic-form">
            <!-- Form akan diisi oleh sistem admin -->
        </div>
        
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        
        <button class="main-btn" id="btn-kirim" onclick="prosesKirim()">Kirim Sekarang</button>
    </div>

    <!-- VIEW ADMIN -->
    <div id="admin-view" class="section">
        <div id="loginAdmin">
            <h2>Login Admin</h2>
            <input type="password" id="passInput" placeholder="Password Admin">
            <button class="main-btn" onclick="checkAdmin()">Masuk</button>
        </div>

        <div id="panelAdmin" style="display:none">
            <h3>Setting Form</h3>
            <label>Nomor WA Admin</label>
            <input type="number" id="noAdmin" placeholder="628xxx">
            
            <label>Tambah Kolom Pertanyaan</label>
            <div id="field-list" style="margin-top:10px"></div>
            <button onclick="addField()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.8em">+ Tambah Kolom</button>
            
            <button class="main-btn" onclick="saveAdminSettings()">Simpan Semua</button>
            <button onclick="closeAdmin()" style="width:100%; background:none; border:none; color:#888; margin-top:10px; cursor:pointer">Keluar</button>
        </div>
    </div>
</div>

<script>
    const PWD = "admin123";
    let fields = JSON.parse(localStorage.getItem('formFields')) || [];

    // --- DARK MODE ---
    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
    }

    // --- RENDER FORM ---
    function renderForm() {
        const container = document.getElementById('dynamic-form');
        if (fields.length === 0) {
            container.innerHTML = '<div class="empty-state">Belum ada kolom tugas. Hubungi admin.</div>';
            document.getElementById('btn-kirim').style.display = 'none';
            return;
        }
        document.getElementById('btn-kirim').style.display = 'block';
        container.innerHTML = fields.map((f, i) => `
            <label>${f}</label>
            <textarea id="field-${i}" placeholder="Isi di sini..." required></textarea>
        `).join('');
    }

    // --- ADMIN LOGIC ---
    function toggleAdmin() {
        document.getElementById('anggota-view').classList.remove('active');
        document.getElementById('admin-view').classList.add('active');
    }

    function checkAdmin() {
        if(document.getElementById('passInput').value === PWD) {
            document.getElementById('loginAdmin').style.display = 'none';
            document.getElementById('panelAdmin').style.display = 'block';
            document.getElementById('noAdmin').value = localStorage.getItem('waAdmin') || "";
            renderAdminFields();
        } else { alert("Salah!"); }
    }

    function addField() {
        fields.push("Pertanyaan Baru");
        renderAdminFields();
    }

    function removeField(index) {
        fields.splice(index, 1);
        renderAdminFields();
    }

    function renderAdminFields() {
        const list = document.getElementById('field-list');
        list.innerHTML = fields.map((f, i) => `
            <div class="field-manager">
                <input type="text" value="${f}" onchange="updateFieldName(${i}, this.value)">
                <button onclick="removeField(${i})" style="color:red; background:none; border:none; cursor:pointer">Hapus</button>
            </div>
        `).join('');
    }

    function updateFieldName(i, val) { fields[i] = val; }

    function saveAdminSettings() {
        localStorage.setItem('waAdmin', document.getElementById('noAdmin').value);
        localStorage.setItem('formFields', JSON.stringify(fields));
        alert("Berhasil disimpan!");
        location.reload();
    }

    function closeAdmin() { location.reload(); }

    // --- KIRIM LOGIC ---
    function prosesKirim() {
        const btn = document.getElementById('btn-kirim');
        const pCont = document.getElementById('p-container');
        const pBar = document.getElementById('p-bar');
        const no = localStorage.getItem('waAdmin');

        if(!no) return alert("Admin belum set nomor WA!");

        // Validasi input
        let dataInput = [];
        for(let i=0; i<fields.length; i++) {
            let val = document.getElementById(`field-${i}`).value;
            if(!val) return alert("Harap isi semua kolom!");
            dataInput.push(`*${fields[i]}:*%0A${val}%0A`);
        }

        // Jalankan Loading
        btn.disabled = true;
        btn.innerText = "Memproses...";
        pCont.style.display = 'block';
        
        let w = 0;
        let interval = setInterval(() => {
            w += 25;
            pBar.style.width = w + '%';
            if(w >= 100) {
                clearInterval(interval);
                const pesan = `*PENGUMPULAN TUGAS*%0A%0A${dataInput.join('%0A')}`;
                window.open(`https://wa.me/${no}?text=${pesan}`, '_blank');
                
                // Reset
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "Kirim Sekarang";
                    pCont.style.display = 'none';
                    pBar.style.width = '0%';
                }, 1000);
            }
        }, 300);
    }

    renderForm();
</script>

</body>
</html>
